environment: development
health:
  duration: 1s
  timeout: 1s
id:
  kind: uuid
max_sleep: 2m
telemetry:
  logger:
    kind: text
    level: info
  metrics:
    kind: prometheus
transport:
  http:
    address: tcp://:11000
    limiter:
      kind: service-method
      tokens: 1000
      interval: 1s
    timeout: 5s
